name: Benchmark

on:
  workflow_dispatch:
    inputs:
      sample_count:
        description: Samples collected for each minifier and input
        required: true
        default: "100"
        type: choice
        options:
          - "50"
          - "100"
          - "200"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never
  CSSNANO_DIR: ${{ github.workspace }}/.benchmark/cssnano

jobs:
  benchmark:
    name: Compare CSS minifiers on Bootstrap and Tailwind
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out RocketCSS
        uses: actions/checkout@v7.0.0

      - name: Check out cssnano
        uses: actions/checkout@v7.0.0
        with:
          repository: cssnano/cssnano
          ref: fb20558b94647f16bfffba875ab8aec0268064d6
          path: .benchmark/cssnano

      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: .benchmark/cssnano/pnpm-lock.yaml

      - name: Install cssnano dependencies
        working-directory: .benchmark/cssnano
        run: pnpm install --frozen-lockfile

      - name: Set up Rust
        uses: moonrepo/setup-rust@v1.3.0
        with:
          channel: stable
          cache-target: release

      - name: Run Bootstrap and Tailwind minifier benchmarks
        id: benchmark
        shell: bash
        run: |
          set -o pipefail
          cargo bench --quiet -p rocketcss_benchmark --bench minify -- \
            --sample-count "${{ inputs.sample_count }}" 2>&1 \
            | tee .benchmark/result.txt

      - name: Add benchmark results to summary
        if: ${{ always() }}
        shell: bash
        run: |
          {
            echo "## CSS minifier benchmark"
            echo
            echo "- Status: \`${{ steps.benchmark.outcome }}\`"
            echo "- Commit: [\`${GITHUB_SHA::7}\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA})"
            echo "- Runner: \`${RUNNER_OS} ${RUNNER_ARCH}\`"
            echo "- Inputs: \`tasks/benchmark/files/bootstrap.css\`, \`tasks/benchmark/files/tailwind.css\`"
            echo "- Scope: parse, minify, and codegen medians; total sums the stages (cssnano is measured end-to-end only)"
            echo "- Samples per minifier and input: \`${{ inputs.sample_count }}\`"
            echo

            if [[ -s .benchmark/result.txt ]]; then
              node tasks/benchmark/scripts/format-minify-results.mjs \
                .benchmark/result.txt
            else
              echo "_The benchmark did not produce any output._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
